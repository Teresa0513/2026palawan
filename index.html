<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 基高巴拉望之旅</title>
    
    <link rel="icon" href="logo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --company-navy: #003366;
            --ocean-blue: #0077be;
            --accent-cyan: #00d2ff;
            --glass-bg: rgba(255, 255, 255, 0.96);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans TC', 'Poppins', sans-serif;
            background-color: var(--company-navy);
            overflow-x: hidden;
        }

        /* 背景圖設定：確保鯨鯊在中間區域 */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background-image: url('bg.jpg');
            background-size: cover;
            background-position: center 75%; /* 稍微往上調一點點點，讓鯨鯊浮現 */
            background-repeat: no-repeat;
        }

        nav {
            background: var(--company-navy);
            padding: 10px 5%;
            position: fixed;
            width: 100%; top: 0; z-index: 1000;
            display: flex; justify-content: space-between; align-items: center;
            color: white;
            box-shadow: 0 2px 15px rgba(0,0,0,0.3);
        }
        nav .brand { font-weight: 700; font-size: 1rem; }
        nav img { height: 35px; width: auto; }

        header {
            min-height: 85vh; /* 增加標頭空間，讓背景多露出一點 */
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; text-align: center; padding: 120px 20px 80px;
        }

        header h1, header h2, header p {
            text-shadow: 0px 2px 15px rgba(0,0,0,0.9);
        }

        #countdown {
            font-size: 1rem;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(5px);
            padding: 8px 22px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.4);
            margin-bottom: 25px;
            font-weight: 600;
        }

        .download-btn {
            display: inline-block;
            padding: 12px 35px;
            background: var(--accent-cyan);
            color: var(--company-navy);
            text-decoration: none;
            border-radius: 50px;
            font-weight: 800;
            border: 2px solid white;
            box-shadow: 0 5px 20px rgba(0,0,0,0.4);
            margin-top: 15px;
        }

        /* 波浪裝飾：降低拉抬高度 */
        .wave-container { 
            width: 100%; 
            overflow: hidden; 
            line-height: 0; 
            margin-top: -60px; /* 從 -100 改回 -60 */
        }
        .wave-container svg { width: 150%; height: 60px; }

        /* 內容容器：關鍵調整！讓它往下移 */
        .container { 
            max-width: 850px; 
            margin: -20px auto 60px; /* 大幅下調！從 -120px 改回 -20px，避免遮擋標題 */
            padding: 0 15px; 
            position: relative; 
            z-index: 10; 
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        h2.section-title { 
            color: var(--company-navy); margin-bottom: 20px; 
            border-left: 6px solid var(--ocean-blue); padding-left: 12px;
            display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 1.5rem;
        }

        .flight-card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 15px; border: 1px solid #eee; }
        
        footer { text-align: center; padding: 50px 20px; color: white; background: var(--company-navy); }

        .reveal { opacity: 0; transform: translateY(40px); transition: 0.8s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* 手機版適配 */
        @media (max-width: 600px) {
            body::before {
                background-position: center 80%;
                background-attachment: scroll;
            }
            header {
                min-height: 90vh;
                padding-top: 140px;
            }
            .container { margin-top: -10px; } /* 手機版也不要遮到按鈕 */
            header h1 { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="brand">EAGLE PROCESS 基高公司</div>
        <div><img src="logo.png" alt="LOGO"></div>
    </nav>

    <header>
        <div id="countdown">載入中...</div>
        <h2 style="font-size: 1.2rem; opacity: 0.9;">2026 基高公司員工旅遊</h2>
        <h1 style="margin: 10px 0; font-size: 3.5rem;">巴頓秘境 ・ 與海共舞</h1>
        <p style="font-size: 1rem; letter-spacing: 3px; margin-bottom: 10px;">PHILIPPINES · PALAWAN</p>
        <div>
            <a href="itinerary.pdf" download class="download-btn">
                <i class="fa-solid fa-cloud-arrow-down"></i> 下載行程單
            </a>
        </div>
    </header>

    <div class="wave-container">
        <svg viewBox="0 0 500 150" preserveAspectRatio="none"><path d="M0.00,49.98 C149.99,150.00 349.20,-49.98 500.00,49.98 L500.00,150.00 L0.00,150.00 Z" style="stroke: none; fill: rgba(0, 51, 102, 1);"></path></svg>
    </div>

    <div class="container">
        <section class="glass-card reveal">
            <h2 class="section-title"><i class="fa-solid fa-plane"></i> 航班資訊</h2>
            <div class="flight-card">
                <p style="font-weight:800; color:var(--ocean-blue); margin-bottom:12px; border-bottom:1px solid #eee; padding-bottom:8px; font-size: 1.1rem;">07/03 (五) 去程</p>
                <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                    <span>PR891 台北 ➔ 馬尼拉</span>
                    <span style="font-family:Poppins; font-weight:600;">09:45 - 12:20</span>
                </div>
                <div style="display:flex; justify-content:space-between;">
                    <span>PR2787 馬尼拉 ➔ 公主港</span>
                    <span style="font-family:Poppins; font-weight:600;">16:35 - 17:55</span>
                </div>
            </div>
            <div class="flight-card">
                <p style="font-weight:800; color:#d35400; margin-bottom:12px; border-bottom:1px solid #eee; padding-bottom:8px; font-size: 1.1rem;">07/07 (二) 回程</p>
                <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                    <span>PR2782 公主港 ➔ 馬尼拉</span>
                    <span style="font-family:Poppins; font-weight:600;">08:30 - 09:50</span>
                </div>
                <div style="display:flex; justify-content:space-between;">
                    <span>PR894 馬尼拉 ➔ 台北</span>
                    <span style="font-family:Poppins; font-weight:600;">12:35 - 15:05</span>
                </div>
            </div>
        </section>

        <!-- 行程區塊 (略，與之前相同) -->
    </div>

    <footer>
        <p>基高股份有限公司 Eagle Process Service</p>
    </footer>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

        const targetDate = new Date('July 3, 2026 09:45:00').getTime();
        function updateCountdown() {
            const now = new Date().getTime();
            const diff = targetDate - now;
            if (diff <= 0) {
                document.getElementById('countdown').innerHTML = "旅程已開啟！";
                return;
            }
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);
            document.getElementById('countdown').innerHTML = `<i class="fa-solid fa-clock"></i> 倒數 ${d}天 ${h}時 ${m}分 ${s}秒`;
        }
        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>

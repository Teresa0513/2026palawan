<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 基高巴拉望之旅</title>
    
    <link rel="icon" href="logo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --company-navy: #003366;
            --ocean-blue: #0077be;
            --accent-cyan: #00d2ff;
            --glass-bg: rgba(255, 255, 255, 0.96);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans TC', 'Poppins', sans-serif;
            background-color: var(--company-navy);
            overflow-x: hidden;
        }

        /* 背景圖設定 */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background-image: url('bg.jpg');
            background-size: cover;
            background-position: center 80%; 
            background-repeat: no-repeat;
        }

        nav {
            background: var(--company-navy);
            padding: 10px 5%;
            position: fixed;
            width: 100%; top: 0; z-index: 1000;
            display: flex; justify-content: space-between; align-items: center;
            color: white;
            box-shadow: 0 2px 15px rgba(0,0,0,0.3);
        }
        nav .brand { font-weight: 700; font-size: 1rem; }
        nav img { height: 35px; width: auto; }

        /* --- Header 調整：讓標題區塊往上 --- */
        header {
            min-height: 85vh;
            display: flex; flex-direction: column;
            justify-content: center; 
            align-items: center;
            color: white; text-align: center; 
            padding: 80px 20px 20px; /* 縮減上下 padding */
        }

        header h1, header h2, header p {
            text-shadow: 0px 2px 15px rgba(0,0,0,0.9);
        }

        #countdown {
            font-size: 1rem;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(5px);
            padding: 8px 22px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.4);
            margin-bottom: 15px;
            font-weight: 600;
        }

        .download-btn {
            display: inline-block;
            padding: 12px 35px;
            background: var(--accent-cyan);
            color: var(--company-navy);
            text-decoration: none;
            border-radius: 50px;
            font-weight: 800;
            border: 2px solid white;
            box-shadow: 0 5px 20px rgba(0,0,0,0.4);
            margin-top: 10px;
        }

        .wave-container { 
            width: 100%; overflow: hidden; line-height: 0; 
            margin-top: -100px; /* 拉高波浪 */
        }
        .wave-container svg { width: 150%; height: 60px; }

        /* --- 航班資訊白盒調整：往上移動 --- */
        .container { 
            max-width: 850px; 
            margin: -120px auto 60px; /* 大幅往上拉，貼近鯨鯊區塊 */
            padding: 0 15px; 
            position: relative; 
            z-index: 10; 
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        h2.section-title { 
            color: var(--company-navy); margin-bottom: 15px; 
            border-left: 6px solid var(--ocean-blue); padding-left: 12px;
            display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 1.4rem;
        }

        .flight-card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 10px; border: 1px solid #eee; }
        
        /* 解決手機版文字擠在一起的問題 */
        .flight-row {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;
            font-size: 0.95rem;
        }
        .flight-route { font-weight: 500; flex: 1; }
        .flight-time { font-family: 'Poppins'; font-weight: 600; text-align: right; min-width: 100px; }

        footer { text-align: center; padding: 40px 20px; color: white; background: var(--company-navy); }

        .reveal { opacity: 0; transform: translateY(30px); transition: 0.8s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* --- 手機版特別強制優化 --- */
        @media (max-width: 600px) {
            body::before {
                background-position: center 80%;
                background-attachment: scroll;
            }
            header {
                min-height: 75vh;
                padding-top: 70px; /* 極致往上提 */
                justify-content: flex-start; /* 讓內容靠上 */
            }
            header h1 { font-size: 2.4rem; line-height: 1.1; }
            header h2 { font-size: 1rem; margin-bottom: 5px; }
            .container { 
                margin-top: -180px; /* 手機版將白盒強力拉往上 */
            }
            .flight-row { font-size: 0.85rem; } /* 縮小字體防止換行 */
            .flight-time { min-width: 90px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="brand">EAGLE PROCESS 基高公司</div>
        <div><img src="logo.png" alt="LOGO"></div>
    </nav>

    <header>
        <div id="countdown">載入中...</div>
        <h2>2026 基高公司員工旅遊</h2>
        <h1>巴頓秘境 ・ 與海共舞</h1>
        <p style="font-size: 0.9rem; letter-spacing: 2px; margin-bottom: 10px; opacity: 0.9;">PHILIPPINES · PALAWAN</p>
        <a href="itinerary.pdf" download class="download-btn">
            <i class="fa-solid fa-cloud-arrow-down"></i> 下載行程單
        </a>
    </header>

    <div class="wave-container">
        <svg viewBox="0 0 500 150" preserveAspectRatio="none"><path d="M0.00,49.98 C149.99,150.00 349.20,-49.98 500.00,49.98 L500.00,150.00 L0.00,150.00 Z" style="stroke: none; fill: rgba(0, 51, 102, 1);"></path></svg>
    </div>

    <div class="container">
        <section class="glass-card reveal">
            <h2 class="section-title"><i class="fa-solid fa-plane"></i> 航班資訊</h2>
            
            <div class="flight-card">
                <p style="font-weight:800; color:var(--ocean-blue); margin-bottom:10px; font-size:1rem;">07/03 (五) 去程</p>
                <div class="flight-row">
                    <span class="flight-route">PR891 台北 ➔ 馬尼拉</span>
                    <span class="flight-time">09:45 - 12:20</span>
                </div>
                <div class="flight-row">
                    <span class="flight-route">PR2787 馬尼拉 ➔ 公主港</span>
                    <span class="flight-time">16:35 - 17:55</span>
                </div>
            </div>

            <div class="flight-card">
                <p style="font-weight:800; color:#d35400; margin-bottom:10px; font-size:1rem;">07/07 (二) 回程</p>
                <div class="flight-row">
                    <span class="flight-route">PR2782 公主港 ➔ 馬尼拉</span>
                    <span class="flight-time">08:30 - 09:50</span>
                </div>
                <div class="flight-row">
                    <span class="flight-route">PR894 馬尼拉 ➔ 台北</span>
                    <span class="flight-time">12:35 - 15:05</span>
                </div>
            </div>
        </section>

        <!-- 行程區塊 (略，與之前相同) -->
    </div>

    <footer>
        <p>基高股份有限公司 Eagle Process Service</p>
    </footer>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

        const targetDate = new Date('July 3, 2026 09:45:00').getTime();
        function updateCountdown() {
            const now = new Date().getTime();
            const diff = targetDate - now;
            if (diff <= 0) {
                document.getElementById('countdown').innerHTML = "旅程正式開啟！";
                return;
            }
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);
            document.getElementById('countdown').innerHTML = `<i class="fa-solid fa-clock"></i> 倒數 ${d}天 ${h}時 ${m}分 ${s}秒`;
        }
        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
